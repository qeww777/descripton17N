<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>descripton17N</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.box{
    text-align:center;
}

h1{
    margin-bottom:30px;
}

button{
    padding:18px 40px;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:36px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <h1>descripton17N</h1>

    <button onclick="roll()">ROLL</button>

    <div id="result">Нажмите ROLL</div>
</div>

<script>
function roll() {
    const colors = [
        "🔴 Красный",
        "🟢 Зелёный",
        "🔵 Синий",
        "🟡 Жёлтый"
    ];

    const random = colors[Math.floor(Math.random() * colors.length)];
    document.getElementById("result").textContent = random;
}
</script>

</body>
</html>
